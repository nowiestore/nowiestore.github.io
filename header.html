<!-- NowieStore Global Header — Pink Theme -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fff0f5;
    color: #3a1a2e;
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
  }

  #nw-header {
    position: sticky;
    top: 0;
    z-index: 9999;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 clamp(1rem, 5vw, 2.5rem);
    background: rgba(255, 240, 245, 0.96);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 2px solid rgba(212, 32, 117, 0.12);
    transition: box-shadow 0.3s ease;
  }

  #nw-header.scrolled {
    box-shadow: 0 4px 24px rgba(212, 32, 117, 0.1);
  }

  /* LOGO — landscape, karakter overflow */
  .nw-logo {
    display: flex;
    align-items: center;
    text-decoration: none;
    height: 90%;
    /* Biarkan karakter sedikit overflow ke atas */
    overflow: visible;
  }

  .nw-logo img {
    height: 170px;
    width: auto;
    object-fit: contain;
    filter: drop-shadow(0 2px 4px rgba(212,32,117,0.1));
    transition: transform 0.2s ease;
  }

  .nw-logo:hover img {
    transform: scale(1.03);
  }

  /* KANAN HEADER */
  .nw-header-right {
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .nw-home-link {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #c07090;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 0.35rem;
    font-weight: 700;
    transition: color 0.2s;
  }

  .nw-home-link:hover { color: #d42075; }

  .nw-wa-btn {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    background: #25d366;
    color: #fff;
    text-decoration: none;
    font-family: 'Nunito', sans-serif;
    font-size: 0.76rem;
    font-weight: 700;
    padding: 0.42rem 0.95rem;
    border-radius: 2rem;
    transition: background 0.2s, transform 0.2s;
    white-space: nowrap;
    box-shadow: 0 2px 10px rgba(37,211,102,0.25);
  }

  .nw-wa-btn:hover { background: #1ebe5d; transform: translateY(-1px); }
  .nw-wa-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

  @media (max-width: 480px) {
    .nw-home-link span { display: none; }
    .nw-logo img { height: 170px; }
  }
</style>

<header id="nw-header">
  <a href="https://nowiestore.github.io/" class="nw-logo" id="nw-logo-link">
    <img src="https://nowiestore.github.io/logo.png" alt="NowieStore">
  </a>
  <div class="nw-header-right">
    <a href="https://nowiestore.github.io/" class="nw-home-link" id="nw-home-link">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Beranda</span>
    </a>
    <a href="https://wa.me/6281293106630" target="_blank" class="nw-wa-btn">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      CS / Order
    </a>
  </div>
</header>

<script>
(function() {
  var header = document.getElementById('nw-header');
  window.addEventListener('scroll', function() {
    header.classList.toggle('scrolled', window.scrollY > 10);
  });
  var logoLink = document.getElementById('nw-logo-link');
  var homeLink = document.getElementById('nw-home-link');
  if (logoLink) logoLink.href = 'https://nowiestore.github.io/';
  if (homeLink) homeLink.href = 'https://nowiestore.github.io/';
})();
</script>
