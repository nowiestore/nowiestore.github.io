<!-- NowieStore Global Footer — Pink Theme -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap');

  #nw-footer {
    margin-top: 0;
    padding: 0.8rem clamp(1rem, 5vw, 2.5rem);
    border-top: 2px solid rgba(212, 32, 117, 0.12);
    background: rgba(255, 240, 245, 0.96);
    font-family: 'Nunito', sans-serif;
  }

  .nw-footer-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.8rem;
  }

  /* LOGO */
  .nw-footer-logo {
    height: 180px;
    width: auto;
    object-fit: contain;
  }

  /* PAYMENT */
  .nw-footer-payment {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    flex-wrap: wrap;
  }

  .nw-footer-payment-label {
    font-size: 0.65rem;
    color: #c07090;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
    margin-right: 0.2rem;
  }

  .nw-footer-payment img {
    height: 50px;
    width: auto;
    object-fit: contain;
    border-radius: 6px;
    opacity: 0.85;
    transition: opacity 0.2s;
  }

  .nw-footer-payment img:hover { opacity: 1; }

  /* WA BUTTON */
  .nw-footer-wa {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: #25d366;
    color: #fff;
    font-size: 0.78rem;
    font-weight: 700;
    text-decoration: none;
    padding: 0.45rem 1.1rem;
    border-radius: 2rem;
    transition: background 0.2s, transform 0.2s;
    box-shadow: 0 2px 10px rgba(37,211,102,0.25);
    white-space: nowrap;
    font-family: 'Nunito', sans-serif;
  }

  .nw-footer-wa:hover { background: #1ebe5d; transform: translateY(-1px); }
  .nw-footer-wa svg { width: 14px; height: 14px; flex-shrink: 0; }

  /* COPYRIGHT */
  .nw-footer-copy {
    width: 100%;
    text-align: center;
    font-size: 0.65rem;
    color: #d4a0b8;
    letter-spacing: 0.05em;
    padding-top: 0.8rem;
    border-top: 1px solid rgba(212, 32, 117, 0.08);
    margin-top: 0.2rem;
    font-family: 'Nunito', sans-serif;
  }

  @media (max-width: 600px) {
    .nw-footer-inner { flex-direction: column; align-items: center; text-align: center; }
    .nw-footer-payment { justify-content: center; }
  }
</style>

<footer id="nw-footer">

    <div class="nw-footer-payment">
